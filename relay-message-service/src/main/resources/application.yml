server:
  port: 8083

spring:
  application:
    name: relay-message-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/message_db}
    username: ${DB_USER:relay}
    password: ${DB_PASSWORD:relay}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

relay:
  events:
    exchange: relay.events
    routing-key:
      message-published: message.published

logging:
  level:
    com.relay: INFO