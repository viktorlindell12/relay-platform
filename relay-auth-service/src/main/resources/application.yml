server:
  port: 8081

spring:
  application:
    name: relay-auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USER:relay}
    password: ${DB_PASSWORD:relay}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-at-least-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.relay: INFO