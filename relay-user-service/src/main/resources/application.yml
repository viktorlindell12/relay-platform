server:
  port: 8082

spring:
  application:
    name: relay-user-service
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${DB_USER:relay}
    password: ${DB_PASSWORD:relay}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  server:
    port: ${GRPC_PORT:9090}

logging:
  level:
    com.relay: INFO