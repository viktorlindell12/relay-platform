services:
  postgres:
    image: postgres:16
    container_name: relay-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-relay}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: auth_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-extra-dbs.sh:/docker-entrypoint-initdb.d/init-extra-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-relay}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: relay-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      # AMQP (5672) is internal only — consumed by message-service and bot-service within the Docker network
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  relay-auth-service:
    build:
      context: .
      dockerfile: relay-auth-service/Dockerfile
    container_name: relay-auth-service
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USER: ${DB_USER:-relay}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  relay-user-service:
    build:
      context: .
      dockerfile: relay-user-service/Dockerfile
    container_name: relay-user-service
    environment:
      USER_DB_URL: jdbc:postgresql://postgres:5432/user_db
      DB_USER: ${DB_USER:-relay}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
      GRPC_PORT: ${GRPC_PORT:-9090}
    # HTTP (8082) and gRPC (9090) ports are intentionally not published — reachable only within the Docker network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  relay-message-service:
    build:
      context: .
      dockerfile: relay-message-service/Dockerfile
    container_name: relay-message-service
    environment:
      MESSAGE_DB_URL: jdbc:postgresql://postgres:5432/message_db
      DB_USER: ${DB_USER:-relay}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
      USER_SERVICE_GRPC_ADDRESS: relay-user-service:${GRPC_PORT:-9090}
    # HTTP port (8083) is intentionally not published — reachable only within the Docker network via the BFF
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  relay-bot-service:
    build:
      context: .
      dockerfile: relay-bot-service/Dockerfile
    container_name: relay-bot-service
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
      MESSAGE_SERVICE_URL: http://relay-message-service:8083
      BOT_USER_ID: ${BOT_USER_ID:-0}
    # HTTP port (8084) is intentionally not published — bot has no client-facing API
    depends_on:
      rabbitmq:
        condition: service_healthy
      relay-message-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  relay-bff-service:
    build:
      context: .
      dockerfile: relay-bff-service/Dockerfile
    container_name: relay-bff-service
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
      AUTH_SERVICE_URL: http://relay-auth-service:8081
      USER_SERVICE_URL: http://relay-user-service:8082
      MESSAGE_SERVICE_URL: http://relay-message-service:8083
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      relay-auth-service:
        condition: service_healthy
      relay-user-service:
        condition: service_healthy
      relay-message-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data: