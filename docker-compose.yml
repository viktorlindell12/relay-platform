services:
  postgres:
    image: postgres:16
    container_name: relay-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-relay}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: auth_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-extra-dbs.sh:/docker-entrypoint-initdb.d/init-extra-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-relay}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: relay-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  relay-auth-service:
    build:
      context: .
      dockerfile: relay-auth-service/Dockerfile
    container_name: relay-auth-service
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USER: ${DB_USER:-relay}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  relay-user-service:
    build:
      context: .
      dockerfile: relay-user-service/Dockerfile
    container_name: relay-user-service
    environment:
      USER_DB_URL: jdbc:postgresql://postgres:5432/user_db
      DB_USER: ${DB_USER:-relay}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
      GRPC_PORT: ${GRPC_PORT:-9090}
    ports:
      - "127.0.0.1:8082:8082"
    # gRPC port 9090 is intentionally not published to the host — reachable only within the Docker network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data: